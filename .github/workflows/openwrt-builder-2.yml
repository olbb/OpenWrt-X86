name: OpenWrt Builder New

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    # 1. 移除多余的重复清理插件，保留单极扩容，省下重复扫盘时间
    - name: Freeing up disk space
      uses: easimon/maximize-build-space@master
      with: 
        root-reserve-mb: 4096
        overprovision-lvm: true
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="
    
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev tree
        curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
        sudo apt install -y nodejs
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE
        echo "-----------------------------------------------------------------------------"
        which node
        which npm
        node -v
        npm -v 
        # sudo chown -R 1001:128 "/home/runner/.npm"
        npm install semver
        echo "-----------------------------------------------------------------------------"

    - name: Clone source code
      working-directory: ./
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
      
    # 【核心注入】：在 Clone 源码之后，立刻切入现成的 cachewrtbuild 方案
    - name: Cache Wrt Build
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        toolchain: 'true'
        skip: 'true'
        prefix: 'openwrt'
        mixkey: 'x86_64'

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Custom config after update
      run: |
        chmod +x diy-custom.sh
        cd openwrt
        $GITHUB_WORKSPACE/diy-custom.sh
        echo '-------------------------------feeds----------------------------------'
        tree -L 3 feeds
        echo '-------------------------------feeds----------------------------------'
        

    - name: Install feeds
      run: |
        cd openwrt && ./scripts/feeds install -a
        echo '-------------------------------package/feeds----------------------------------'
        tree -L 3 package/feeds
        echo '-------------------------------package/feeds----------------------------------'

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig

        echo "================================================="
        echo "1. 检查当前 .config 文件中的设定值："
        grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || echo "未在 .config 中找到该项"
        echo "================================================="
        
        echo "2. 检查 target 默认配置（config-default）中的设定值："
        grep "CONFIG_TARGET_ROOTFS_PARTSIZE" target/linux/x86/config-default target/linux/x86/64/config-default 2>/dev/null || true
        echo "================================================="
        
        echo "3. 检查 Makefile 中关于 ROOTFS_PARTSIZE 的规则定义："
        grep -n "ROOTFS_PARTSIZE" target/linux/x86/image/Makefile
        echo "================================================="
    
        make -I target/linux/x86/image TOPDIR=$PWD -f - debug << 'EOF'
        include .config
        include rules.mk
        include target/linux/x86/image/Makefile
        
        debug:
        	@echo "====================================="
        	@echo "[DEBUG] CONFIG_TARGET_ROOTFS_PARTSIZE = [$(CONFIG_TARGET_ROOTFS_PARTSIZE)]"
        	@echo "[DEBUG] ROOTFS_PARTSIZE = [$(ROOTFS_PARTSIZE)]"
        	@echo "====================================="
        EOF
        
  
